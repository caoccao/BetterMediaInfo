name: Windows Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - .github/**
      - "!.github/workflows/windows_build.yml"
      - "**.md"
      - "docs/**"
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
      - "!.github/workflows/windows_build.yml"
      - "**.md"
      - "docs/**"

env:
  BETTER_MEDIA_INFO_VERSION: 0.9.0
  MEDIA_INFO_LIB_VERSION: v26.01

jobs:
  build_package:
    name: Build for Windows x86_64
    runs-on: windows-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.28.x'

    - name: Build zlib
      run: |
        cd ..
        curl -o zlib.zip https://zlib.net/zlib132.zip
        7z x zlib.zip
        move zlib-1.3.2 zlib
        del zlib.zip
        cd zlib
        cmake -G "Visual Studio 17 2022" -A x64 -S . -B contrib/vstudio/vc17
        cmake --build contrib/vstudio/vc17 --config Release

    - name: Download ZenLib
      run: |
        cd ..
        git clone https://github.com/MediaArea/ZenLib.git

    - name: Build MediaInfoLib
      run: |
        cd ..
        git clone -b ${{ env.MEDIA_INFO_LIB_VERSION }} --depth 1 https://github.com/MediaArea/MediaInfoLib.git
        cd BetterMediaInfo/scripts/ts
        deno task patch
        cd ../../../MediaInfoLib\Project\MSVC2022
        msbuild MediaInfoLib.sln -t:rebuild -verbosity:diag -property:Configuration=Release -property:Platform=x64

    - name: Copy DLLs
      run: |
        node src-tauri\scripts\copy_dlls.cjs

    - name: Patch tauri.conf.json
      run: |
        node src-tauri\scripts\patch_tauri_conf.cjs

    - name: Build BetterMediaInfo
      run: |
        pnpm install
        cd src-tauri
        cargo test -r
        cd ..
        pnpm tauri build

    - name: Upload the msi
      uses: actions/upload-artifact@v7
      with:
        name: BetterMediaInfo-windows-x86_64-${{ env.BETTER_MEDIA_INFO_VERSION }}-msi
        path: |
          src-tauri/target/release/bundle/msi/*.msi

    - name: Upload the nsis
      uses: actions/upload-artifact@v7
      with:
        name: BetterMediaInfo-windows-x86_64-${{ env.BETTER_MEDIA_INFO_VERSION }}-nsis
        path: |
          src-tauri/target/release/bundle/nsis/*.exe
