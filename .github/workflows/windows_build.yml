name: Windows Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - .github/**
      - "!.github/workflows/windows_build.yml"
      - "**.md"
      - "docs/**"
  push:
    paths-ignore:
      - .github/**
      - "!.github/workflows/windows_build.yml"
      - "**.md"
      - "docs/**"

env:
  BETTER_MEDIA_INFO_VERSION: 1.1.0
  MEDIA_INFO_LIB_VERSION: v26.05

jobs:
  build_package:
    name: Build for Windows x86_64
    runs-on: windows-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3
      with:
        vs-version: '[18.0,19.0)'

    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '4.2.x'

    - name: Build zlib
      run: |
        cd ..
        curl -o zlib.zip https://zlib.net/zlib132.zip
        7z x zlib.zip
        move zlib-1.3.2 zlib
        del zlib.zip
        cd zlib
        cmake -G "Visual Studio 18 2026" -A x64 -S . -B contrib/vstudio/vc18
        cmake --build contrib/vstudio/vc18 --config Release

    - name: Download ZenLib
      run: |
        cd ..
        git clone https://github.com/MediaArea/ZenLib.git

    - name: Build MediaInfoLib
      run: |
        cd ..
        git clone -b ${{ env.MEDIA_INFO_LIB_VERSION }} --depth 1 https://github.com/MediaArea/MediaInfoLib.git
        cd BetterMediaInfo/scripts/ts
        deno task patch
        cd ../../../MediaInfoLib\Project\MSVC2026
        msbuild MediaInfoLib.slnx -t:rebuild -verbosity:diag -property:Configuration=Release -property:Platform=x64

    - name: Copy DLLs
      run: |
        node src-tauri\scripts\copy_dlls.cjs

    - name: Patch tauri.conf.json
      run: |
        node src-tauri\scripts\patch_tauri_conf.cjs

    - name: Test BetterMediaInfo
      run: |
        cd src-tauri
        cargo test -r

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 11

    - name: Build BetterMediaInfo
      run: |
        pnpm install --frozen-lockfile
        pnpm tauri build

    - name: Set up 7z
      shell: pwsh
      run: |
        $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
        if (-not (Test-Path $sevenZip)) {
          choco install 7zip -y --no-progress
          $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
        }
        if (-not (Test-Path $sevenZip)) {
          throw "7z.exe was not found after setup."
        }
        Split-Path $sevenZip | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Create portable 7z archive
      shell: pwsh
      run: |
        $releaseDir = "src-tauri\target\release"
        $archiveDir = "src-tauri\target\release\bundle\portable"
        $archiveName = "BetterMediaInfo-windows-x86_64-${{ env.BETTER_MEDIA_INFO_VERSION }}-portable.7z"
        $portableDir = Join-Path $archiveDir "BetterMediaInfo"
        $exePath = Join-Path $releaseDir "BetterMediaInfo.exe"

        if (-not (Test-Path $exePath)) {
          throw "Could not find BetterMediaInfo.exe in $releaseDir."
        }

        New-Item -ItemType Directory -Force -Path $archiveDir | Out-Null
        if (Test-Path $portableDir) {
          Remove-Item -Recurse -Force $portableDir
        }
        New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
        $archiveDirPath = (Resolve-Path $archiveDir).Path
        $archivePath = Join-Path $archiveDirPath $archiveName

        Copy-Item $exePath -Destination $portableDir
        $dlls = @(Get-ChildItem -Path $releaseDir -Filter "*.dll" -File)
        if ($dlls.Count -eq 0) {
          throw "No DLL files found in $releaseDir for the portable archive."
        }
        Copy-Item $dlls.FullName -Destination $portableDir

        Push-Location $portableDir
        try {
          7z a -t7z $archivePath *
        } finally {
          Pop-Location
        }

    - name: Upload the msi
      uses: actions/upload-artifact@v7
      with:
        name: BetterMediaInfo-windows-x86_64-${{ env.BETTER_MEDIA_INFO_VERSION }}-msi
        path: |
          src-tauri/target/release/bundle/msi/*.msi

    - name: Upload the nsis
      uses: actions/upload-artifact@v7
      with:
        name: BetterMediaInfo-windows-x86_64-${{ env.BETTER_MEDIA_INFO_VERSION }}-nsis
        path: |
          src-tauri/target/release/bundle/nsis/*.exe

    - name: Upload the portable 7z
      uses: actions/upload-artifact@v7
      with:
        name: BetterMediaInfo-windows-x86_64-${{ env.BETTER_MEDIA_INFO_VERSION }}-portable
        path: |
          src-tauri/target/release/bundle/portable/*.7z
